databases:
  - name: aureo-db
    databaseName: postgres
    plan: free

services:
  # Backend API
  - type: web
    name: aureo-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aureo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://aureo.vercel.app
    autoDeploy: true

