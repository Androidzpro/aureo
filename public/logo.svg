<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- F letter -->
  <path d="M55 50 H145" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M55 50 V155" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M55 100 H120" stroke="white" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Upward arrow -->
  <path d="M130 65 L155 40 L155 65" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="155" y1="40" x2="115" y2="80" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Small dots decoration -->
  <circle cx="145" cy="145" r="8" fill="white" opacity="0.3"/>
  <circle cx="165" cy="125" r="5" fill="white" opacity="0.2"/>
  <circle cx="125" cy="160" r="4" fill="white" opacity="0.15"/>
</svg>
