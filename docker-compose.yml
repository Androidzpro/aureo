version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aureo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aureo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aureo-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aureo-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aureo.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - aureo-network

networks:
  aureo-network:
    driver: bridge

volumes:
  postgres_data:
